<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin | Gregg McElwee, Real Estate &amp; Loans</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* Admin-only styles, scoped here so they never touch the public site. */
    .admin-wrap { max-width: 860px; margin-inline: auto; padding: var(--gap-loose) var(--gap-standard); }
    .admin-bar { display: flex; justify-content: space-between; align-items: center; gap: var(--gap-tight);
      padding-block: var(--gap-tight); border-bottom: 1px solid var(--border); margin-bottom: var(--gap-loose); }
    .admin-bar .meta { margin: 0; }
    .admin-tabs { display: flex; gap: var(--gap-tight); margin-bottom: var(--gap-loose); }
    .admin-tab { padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-card);
      background: #fff; cursor: pointer; font: inherit; }
    .admin-tab[aria-selected="true"] { background: var(--navy); color: #fff; border-color: var(--navy); }
    .hidden { display: none !important; }

    /* Gregg view */
    .record-card { text-align: center; padding: var(--gap-loose); border: 1px solid var(--border);
      border-radius: var(--radius-card); background: var(--light-gray); }
    .record-card .topic-title { font-family: var(--font-head); font-size: 26px; color: var(--navy);
      margin: var(--gap-tight) 0; }
    .guiding { text-align: left; max-width: 560px; margin: var(--gap-standard) auto; }
    .guiding li { margin-bottom: 6px; }
    .record-btn { width: 96px; height: 96px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--gold); color: var(--navy); font-weight: 600; font-size: 15px; margin: var(--gap-tight); }
    .record-btn.recording { background: #c0392b; color: #fff; animation: pulse 1.2s infinite; }
    .record-btn:disabled { opacity: .5; cursor: not-allowed; }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,.5); } 50% { box-shadow: 0 0 0 14px rgba(192,57,43,0); } }
    .record-status { margin-top: var(--gap-standard); font-size: 15px; min-height: 1.4em; }
    audio { width: 100%; margin-top: var(--gap-standard); }

    /* Editor view */
    .toggle-row { display: flex; align-items: center; gap: var(--gap-tight); margin-bottom: var(--gap-loose);
      padding: var(--gap-standard); border: 1px solid var(--border); border-radius: var(--radius-card); }
    .switch { position: relative; width: 52px; height: 28px; flex: none; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #bbb; border-radius: 28px; transition: .2s; cursor: pointer; }
    .slider::before { content: ""; position: absolute; height: 22px; width: 22px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: .2s; }
    .switch input:checked + .slider { background: var(--navy); }
    .switch input:checked + .slider::before { transform: translateX(24px); }
    .post-editor { border: 1px solid var(--border); border-radius: var(--radius-card); padding: var(--gap-standard);
      margin-bottom: var(--gap-standard); }
    .field { margin-bottom: var(--gap-standard); }
    .field label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .field input, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border);
      border-radius: 6px; font: inherit; }
    .field .charcount { font-size: 12px; color: var(--text-muted); }
    .field textarea.body { min-height: 320px; font-family: ui-monospace, monospace; font-size: 13px; }
    .field textarea.social { min-height: 90px; }
    .chips span { display: inline-block; background: var(--light-gray); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 10px; margin: 2px; font-size: 13px; }
    .preview { border: 1px dashed var(--border); border-radius: 6px; padding: var(--gap-standard);
      background: #fff; max-height: 360px; overflow: auto; }
    .lint-warn { background: #fff8e1; border: 1px solid #f0c000; border-radius: 6px; padding: 8px 12px;
      font-size: 13px; margin-bottom: var(--gap-standard); }
    .queue-item, .pub-item { display: flex; justify-content: space-between; gap: var(--gap-tight);
      padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .badge { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: var(--light-gray); }
    .signin { text-align: center; padding: 80px var(--gap-standard); }
    .err { color: #c0392b; }
  </style>
</head>
<body>
  <div class="admin-wrap">

    <!-- Signed-out state -->
    <section id="signin" class="signin hidden">
      <h1>Admin</h1>
      <p class="lead">Sign in to continue.</p>
      <p><a class="btn btn--primary" href="/api/auth/google">Sign in with Google</a></p>
      <p id="signin-msg" class="err"></p>
    </section>

    <!-- Signed-in shell -->
    <div id="app" class="hidden">
      <div class="admin-bar">
        <strong>Gregg McElwee &middot; Blog Admin</strong>
        <p class="meta"><span id="who"></span> &middot; <a href="/api/auth/logout">Sign out</a></p>
      </div>

      <div id="tabs" class="admin-tabs hidden">
        <button class="admin-tab" data-tab="gregg" aria-selected="true">Record</button>
        <button class="admin-tab" data-tab="editor" aria-selected="false">Editor</button>
      </div>

      <!-- ============ Gregg view ============ -->
      <section id="view-gregg">
        <div class="record-card">
          <p class="meta">Your next blog post</p>
          <h2 class="topic-title" id="g-topic">Loading…</h2>
          <p class="meta" id="g-date"></p>

          <ul class="guiding" id="g-questions"></ul>

          <button id="record-btn" class="record-btn" disabled>Record</button>
          <div>
            <button id="submit-btn" class="btn btn--primary hidden">Submit voice note</button>
          </div>
          <audio id="playback" controls class="hidden"></audio>
          <p class="record-status" id="record-status">Waiting for your recording.</p>
        </div>
      </section>

      <!-- ============ Editor view ============ -->
      <section id="view-editor" class="hidden">
        <div class="toggle-row">
          <label class="switch">
            <input type="checkbox" id="toggle">
            <span class="slider"></span>
          </label>
          <div>
            <strong>Editor review</strong>
            <p class="meta" id="toggle-desc" style="margin:0"></p>
          </div>
        </div>

        <h2>Pending review</h2>
        <div id="pending"></div>

        <h2 style="margin-top:var(--gap-loose)">Topics queue</h2>
        <div id="queue"></div>

        <h2 style="margin-top:var(--gap-loose)">Published</h2>
        <div id="published"></div>
      </section>
    </div>
  </div>

  <script src="/admin/admin.js" defer></script>
</body>
</html>
